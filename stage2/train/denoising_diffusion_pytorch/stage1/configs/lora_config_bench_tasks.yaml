name: lora_config_bench_tasks

model:
  base_learning_rate: 4.5e-6
  target: stage1.models.lora_autoencoder.LoRAVAEModel_MoE
  params:
    embed_dim: 1024
    input_key: "weight"
    learning_rate: 1.115e-3

    moe_aux_weight: 1.0e-5
    moe_aux_warmup_steps: 1000
    moe_aux_in_val: false
    moe_router_tau: 1.5
    moe_router_tau_final: 1.2
    moe_router_tau_decay_steps: 2000
    
    lossconfig:
      target: stage1.modules.losses.weight_space_losses.LoRAloss
      params:
        kl_weight: 1.0e-6
        rec_metric: "l2"
        rec_core_weight: 0.0        
        use_dir: true
        use_spec: true
        w_dir: 1.0
        w_spec: 2.0               
        spec_p: 1
        coupled_qv: true
        num_layers: 24
        sched_cfg:
          f_warm: 0.0
          f_mid: 1.0
          w_dir_end: 1.0
          rec_core_mid: 0.0

    ddconfig:
      encoder:
        target: stage1.modules.lora_modules.LoRAEncoder
        params:
          dec_only: true
          d_model: 2304         
          rank: 8
          latent_dim: 64
          hidden_dim: 128
          d_in: 2304
          d_out_q: 2048
          d_out_v: 1024

      decoder:
        target: stage1.modules.lora_modules.StructureAware_LoRADecoder_MoE
        params:
          latent_dim: 64
          lora_rank: 8
          plm_hidden_size: 2304   
          num_layers: 24          
          hidden_dim: 256
          num_experts: 4
          top_k: 1
          noisy_gating: false
          shared_expert_pool: false
          tau: 1.5
          dec_only: true
          dec_d_in: 2304
          dec_dq_out: 2048
          dec_dv_out: 1024

data:
  target: zooloaders.lora_autoloader.LoRAZooDataModule_Multi
  params:
    data_dir: "/path/to/bench_tasks" 
    batch_size: 1
    num_workers: 8
    scale: 1.0
    val_ratio: 0.1
    max_blocks: 288
    seed: 42
    record_split_path: "logs/stage1/${name}/split_record.txt"
    split_file: "data_utils/split/splits/bench_tasks.json"

trainer:
  accelerator: gpu
  devices: -1
  max_epochs: 1000
  min_epochs: 1
  log_every_n_steps: 1
  default_root_dir: logs/stage1/${name}
  accumulate_grad_batches: 8

checkpoint:
  dirpath: logs/stage1/${name}/checkpoints
  filename: epoch{epoch:06d}-aeloss{train/aeloss:.10f}
  mode: min
  monitor: train/aeloss
  save_top_k: 5
